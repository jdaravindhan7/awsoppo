AWSTemplateFormatVersion: 2010-09-09
Description: This is about the ec2 instance
Parameters: 
  ImageId:
    Description: Image
    Type: AWS::EC2::Image::Id
  
  KeyName:
    Description: The Key
    Type: AWS::EC2::KeyPair::KeyName
 
Resources: 
  MyEc2instance:
    Type: AWS::EC2::Instance
    Properties:
      KeyName: !Ref KeyName
      DisableApiTermination: false
      ImageId: !Ref ImageId
      InstanceType: t2.micro
      Monitoring: false
      SubnetId: subnet-06c0e40a8133fc4a4
      SecurityGroupIds:
        - !Ref securityGroup
      UserData: !Base64 |
        #!/bin/bash
        sudo yum update -y
        sudo yum install -y httpd
        sudo systemctl start httpd
        sudo systemctl enable httpd
      Tags:
        - Key: Name
          Value: MercedesAMG

  securityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: AMGPetronas
      GroupDescription: TwinTowers
      VpcId:  vpc-01b60c76151b3b905
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 49.37.211.225/32
        
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: AMGPetronas1 

Outputs:
  InstanceType:
    Description: About the EC2
    Value: !Ref MyEc2instance